<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Productos</title>
</head>
<body>

<h2>CRUD Productos</h2>

<label>ID Producto:</label>
<input type="text" id="idProd"><br><br>

<label>ID Proveedor:</label>
<input type="text" id="idProv"><br><br>

<label>Cantidad Min:</label>
<input type="number" id="cantidadMin"><br><br>

<label>Cantidad Max:</label>
<input type="number" id="cantidadMax"><br><br>

<label>Nombre Producto:</label>
<input type="text" id="nombrePro"><br><br>

<label>Descripción:</label>
<input type="text" id="descripcion"><br><br>

<label>Precio Unitario:</label>
<input type="number" id="precio"><br><br>

<button onclick="guardar()">Guardar</button>
<button onclick="editar()">Editar</button>
<button onclick="eliminar()">Eliminar</button>
<button onclick="limpiar()">Limpiar</button>

<hr>

<table border="1" width="100%">
    <thead>
        <tr>
            <th>ID</th>
            <th>Proveedor</th>
            <th>Min</th>
            <th>Max</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script>
    const url = "http://localhost:8082/api/productos";

    function cargar() {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                let filas = "";
                data.forEach(p => {
                    filas += `
                        <tr onclick="seleccionar('${p.idProd}','${p.idProv}','${p.cantidadMin}','${p.cantidadMax}','${p.nombrePro}','${p.descripcionProducto}','${p.precioUnitario}')">
                            <td>${p.idProd}</td>
                            <td>${p.idProv}</td>
                            <td>${p.cantidadMin}</td>
                            <td>${p.cantidadMax}</td>
                            <td>${p.nombrePro}</td>
                            <td>${p.descripcionProducto}</td>
                            <td>${p.precioUnitario}</td>
                        </tr>
                    `;
                });
                document.getElementById("tabla").innerHTML = filas;
            });
    }

    function seleccionar(idProd,idProv,min,max,nombre,desc,precio){
        document.getElementById("idProd").value = idProd;
        document.getElementById("idProv").value = idProv;
        document.getElementById("cantidadMin").value = min;
        document.getElementById("cantidadMax").value = max;
        document.getElementById("nombrePro").value = nombre;
        document.getElementById("descripcion").value = desc;
        document.getElementById("precio").value = precio;
    }

    function guardar() {
        const producto = {
            idProd: document.getElementById("idProd").value,
            idProv: document.getElementById("idProv").value,
            cantidadMin: parseInt(document.getElementById("cantidadMin").value),
            cantidadMax: parseInt(document.getElementById("cantidadMax").value),
            nombrePro: document.getElementById("nombrePro").value,
            descripcionProducto: document.getElementById("descripcion").value,
            precioUnitario: parseInt(document.getElementById("precio").value)
        };

        fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(producto)
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function editar() {
        const id = document.getElementById("idProd").value;

        const producto = {
            idProd: id,
            idProv: document.getElementById("idProv").value,
            cantidadMin: parseInt(document.getElementById("cantidadMin").value),
            cantidadMax: parseInt(document.getElementById("cantidadMax").value),
            nombrePro: document.getElementById("nombrePro").value,
            descripcionProducto: document.getElementById("descripcion").value,
            precioUnitario: parseInt(document.getElementById("precio").value)
        };

        fetch(url + "/" + id, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(producto)
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function eliminar() {
        const id = document.getElementById("idProd").value;

        fetch(url + "/" + id, {
            method: "DELETE"
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function limpiar() {
        document.getElementById("idProd").value = "";
        document.getElementById("idProv").value = "";
        document.getElementById("cantidadMin").value = "";
        document.getElementById("cantidadMax").value = "";
        document.getElementById("nombrePro").value = "";
        document.getElementById("descripcion").value = "";
        document.getElementById("precio").value = "";
    }

    cargar();
</script>

</body>
</html>
