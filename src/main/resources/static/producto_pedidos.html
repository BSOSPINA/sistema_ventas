<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Producto_Pedidos</title>
</head>
<body>

<h2>CRUD Producto_Pedidos (Detalle Pedido)</h2>

<label>ID Producto:</label>
<input type="text" id="idProd"><br><br>

<label>ID Pedido:</label>
<input type="text" id="idPedido"><br><br>

<label>Cantidad:</label>
<input type="number" id="cantidad"><br><br>

<label>Precio Unitario:</label>
<input type="number" id="precio"><br><br>

<button onclick="guardar()">Guardar</button>
<button onclick="editar()">Editar</button>
<button onclick="eliminar()">Eliminar</button>
<button onclick="limpiar()">Limpiar</button>

<hr>

<table border="1" width="100%">
    <thead>
        <tr>
            <th>ID Producto</th>
            <th>ID Pedido</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script>
    const url = "http://localhost:8082/api/producto_pedidos";

    function cargar() {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                let filas = "";
                data.forEach(pp => {
                    filas += `
                        <tr onclick="seleccionar('${pp.idProd}','${pp.idPedido}','${pp.cantidad}','${pp.precioUnitario}')">
                            <td>${pp.idProd}</td>
                            <td>${pp.idPedido}</td>
                            <td>${pp.cantidad}</td>
                            <td>${pp.precioUnitario}</td>
                        </tr>
                    `;
                });
                document.getElementById("tabla").innerHTML = filas;
            });
    }

    function seleccionar(idProd, idPedido, cantidad, precio) {
        document.getElementById("idProd").value = idProd;
        document.getElementById("idPedido").value = idPedido;
        document.getElementById("cantidad").value = cantidad;
        document.getElementById("precio").value = precio;
    }

    function guardar() {
        const detalle = {
            idProd: document.getElementById("idProd").value,
            idPedido: document.getElementById("idPedido").value,
            cantidad: parseInt(document.getElementById("cantidad").value),
            precioUnitario: parseInt(document.getElementById("precio").value)
        };

        fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(detalle)
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function editar() {
        const idProd = document.getElementById("idProd").value;
        const idPedido = document.getElementById("idPedido").value;

        const detalle = {
            idProd: idProd,
            idPedido: idPedido,
            cantidad: parseInt(document.getElementById("cantidad").value),
            precioUnitario: parseInt(document.getElementById("precio").value)
        };

        fetch(url + "/" + idProd + "/" + idPedido, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(detalle)
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function eliminar() {
        const idProd = document.getElementById("idProd").value;
        const idPedido = document.getElementById("idPedido").value;

        fetch(url + "/" + idProd + "/" + idPedido, {
            method: "DELETE"
        }).then(() => {
            limpiar();
            cargar();
        });
    }

    function limpiar() {
        document.getElementById("idProd").value = "";
        document.getElementById("idPedido").value = "";
        document.getElementById("cantidad").value = "";
        document.getElementById("precio").value = "";
    }

    cargar();
</script>

</body>
</html>
